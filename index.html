<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OurHand — The Privacy-First Watch Collection App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0D1B2A; --slate: #1B263B; --gold: #C9A962; --pearl: #F8F9FA; --charcoal: #2D3142; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    nav { padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    nav .logo { font-family: 'DM Serif Display', serif; color: var(--gold); font-size: 1.5rem; text-decoration: none; letter-spacing: 1px; }
    nav .links { display: flex; gap: 2rem; }
    nav .links a { color: rgba(255,255,255,.6); text-decoration: none; font-size: .9rem; transition: color .2s; }
    nav .links a:hover { color: var(--gold); }
    main { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .hero-content h1 { font-family: 'DM Serif Display', serif; font-size: 3.5rem; color: var(--gold); margin-bottom: 1rem; letter-spacing: 2px; }
    .hero-content p { font-size: 1.2rem; color: rgba(255,255,255,.6); margin-bottom: .5rem; }
    .hero-content .tagline { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: rgba(255,255,255,.85); margin-bottom: 2.5rem; }
    .badge { display: inline-block; padding: .6rem 1.8rem; border: 1px solid var(--gold); color: var(--gold); border-radius: 50px; font-size: .9rem; font-weight: 500; letter-spacing: 1px; }
    footer { color: rgba(255,255,255,.3); text-align: center; padding: 2rem; font-size: .85rem; }
    footer a { color: var(--gold); text-decoration: none; }
    @media (max-width: 600px) { .hero-content h1 { font-size: 2.4rem; } .hero-content .tagline { font-size: 1.1rem; } nav .links { gap: 1rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">OurHand</a>
    <div class="links">
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/support.html">Support</a>
    </div>
  </nav>
  <main>
    <div class="hero-content">
      <h1>OurHand</h1>
      <p class="tagline">The Privacy-First Watch Collection App</p>
      <p>Catalog. Track. Protect.</p>
      <p style="margin-bottom: 2.5rem; color: rgba(255,255,255,.4); font-size: .95rem;">Ad-free. Always.</p>
      <span class="badge">Coming Soon to iOS</span>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 OurHand. All rights reserved. | <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a> · <a href="/support.html">Support</a></p>
  </footer>
</body>
</html>
